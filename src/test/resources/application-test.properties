# Test configuration
spring.main.allow-bean-definition-overriding=true

# H2 Database with all required schemas
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS devices_module\\;CREATE SCHEMA IF NOT EXISTS auth_module\\;CREATE SCHEMA IF NOT EXISTS vehicle_module\\;CREATE SCHEMA IF NOT EXISTS geofence_module\\;CREATE SCHEMA IF NOT EXISTS driver_module\\;CREATE SCHEMA IF NOT EXISTS dispatch_module\\;CREATE SCHEMA IF NOT EXISTS atu_module
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Kafka Test Config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
kafka.topic.position=test-position-topic
kafka.topic.devices=test-devices-topic
kafka.topic.websocket=test-websocket-topic
kafka.topic.notifications=test-notifications-topic
kafka.group.id=test-group-id

# Redis Test Config (Disabled real redis)
spring.data.redis.host=localhost
spring.cache.type=none

# Historical Batch Config (Fast for tests)
historical.batch.initial-delay=0
historical.batch.fixed-delay=100
